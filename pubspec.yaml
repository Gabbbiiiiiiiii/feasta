name: feasta
description: "A catering and event booking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  google_sign_in: ^7.2.0
  http: ^1.6.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/mobile_logo.png"
  adaptive_icon_background: "#FF6333"
  adaptive_icon_foreground: "assets/images/mobile_logo.png"

flutter_native_splash:
  color: "#FF6333"
  image: assets/images/feasta_logo.png

  android_12:
    color: "#FF6333"
    image: assets/images/mobile_logo.png